name: Prosper Witta Production Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prosper-witta-production
  cancel-in-progress: false

jobs:
  ci:
    name: CI - Install and Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build application
        run: npm run build

deploy:
  name: Deploy to Production
  runs-on: ubuntu-latest
  needs: ci

  steps:
    - name: Configure SSH
      env:
        PROD_SSH_KEY_B64: ${{ secrets.PROD_SSH_KEY_B64 }}
        PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
      run: |
        set -e

        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

        printf '%s' "$PROD_SSH_KEY_B64" \
          | base64 --decode \
          > ~/.ssh/prosper_witta_actions

        printf '%s\n' "$PROD_KNOWN_HOSTS" \
          | tr -d '\r' \
          > ~/.ssh/known_hosts

        chmod 600 ~/.ssh/prosper_witta_actions
        chmod 600 ~/.ssh/known_hosts

        ssh-keygen -y \
          -f ~/.ssh/prosper_witta_actions \
          > /dev/null

        echo "SSH private key valid"

    - name: Deploy application
      env:
        PROD_HOST: ${{ secrets.PROD_HOST }}
        PROD_PORT: ${{ secrets.PROD_PORT }}
        PROD_USER: ${{ secrets.PROD_USER }}
      run: |
        ssh \
          -o BatchMode=yes \
          -o StrictHostKeyChecking=yes \
          -o IdentitiesOnly=yes \
          -o ConnectTimeout=15 \
          -i ~/.ssh/prosper_witta_actions \
          -p "$PROD_PORT" \
          "$PROD_USER@$PROD_HOST" \
          'bash -se' << 'DEPLOY_SCRIPT'

          # isi script deployment lu tetap di sini

        DEPLOY_SCRIPT